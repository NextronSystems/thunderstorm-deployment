name: Build and Publish Base Image

on:
  push:
    branches:
      - master
      - ghcr-io  #TODO: remove branch after testing
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - thor_version: "10"
            tag: thor10
            extra_tags: latest
          - thor_version: "11"
            tag: thor11

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.tag }},enable={{is_default_branch}}
            type=raw,value=${{ matrix.extra_tags }},enable=${{ matrix.extra_tags != '' && github.ref_name == github.event.repository.default_branch }}
            type=sha,prefix=sha-${{ matrix.tag }}-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          build-args: THOR_VERSION=${{ matrix.thor_version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
