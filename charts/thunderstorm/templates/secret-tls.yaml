{{- if and .Values.tls.enabled .Values.tls.cert .Values.tls.key (not .Values.tls.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "thunderstorm.tlsSecretName" . }}
  labels:
    {{- include "thunderstorm.labels" . | nindent 4 }}
type: kubernetes.io/tls
stringData:
  tls.crt: {{ .Values.tls.cert | quote }}
  tls.key: {{ .Values.tls.key | quote }}
{{- end }}
