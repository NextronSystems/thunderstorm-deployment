services:
  thunderstorm:
    image: ghcr.io/nextronsystems/thunderstorm-deployment:thor11
    build:
      context: .
      dockerfile: Containerfile
      args:
        THOR_VERSION: "11"
    ports:
      - "${PORT:-8000}:8000"
    environment:
      # Required: your non-host-based Thunderstorm contract token
      CONTRACT_TOKEN: "${CONTRACT_TOKEN}"
      # Optional: hours between signature updates (default: 24)
      # SIGNATURE_UPDATE_INTERVAL: "24"
      # Optional: TLS certificate and private key paths (mounted via secrets)
      # TLS_CERT: "/run/secrets/tls_cert"
      # TLS_KEY: "/run/secrets/tls_key"
      # Optional: upload queue size warning threshold (default: 50000)
      # QUEUE_WARN_SIZE: "50000"
      # Optional: result cache size (default: 250000)
      # RESULT_CACHE_SIZE: "250000"
      # Optional: minimum score for storing samples (default: 200)
      # STORE_SAMPLES_SCORE: "200"
      # Optional: enable VFS directory mirroring uploaded files per host (also uncomment volume below)
      # VFS_ENABLED: "true"
      # Optional: additional Thunderstorm arguments (e.g. "--new-param value")
      # THUNDERSTORM_ARGS: ""
      # Optional: additional THOR arguments (e.g. "--remote-log splunk.intern:514:DEFAULT:TCP")
      # THOR_ARGS: ""
    volumes:
      # Optional: mount TLS certificate and private key (uncomment TLS_CERT/TLS_KEY above as well)
      # - ./tls_cert:/run/secrets/tls_cert:ro
      # - ./tls_key:/run/secrets/tls_key:ro
      # Persist Thor binaries and other artifacts across restarts
      - thor11-data:/opt/nextron/thunderstorm
      - thor11-config:/opt/nextron/thunderstorm/config
      - thor11-queue:/tmp/thunderstorm/.persisted-uploads
      - thor11-samples:/tmp/thunderstorm/uploads
      - thor11-plugins:/opt/nextron/thunderstorm/plugins
      - thor11-signatures:/opt/nextron/thunderstorm/signatures
      - thor11-custom-signatures:/opt/nextron/thunderstorm/custom-signatures
      # Optional: enable VFS directory
      # - thor11-vfs:/tmp/thunderstorm/vfs
    deploy:
      replicas: 1
      update_config:
        order: start-first
      restart_policy:
        condition: on-failure

volumes:
  thor11-data:
  thor11-config:
  thor11-queue:
  thor11-samples:
  thor11-plugins:
  thor11-signatures:
  thor11-custom-signatures:
  # Optional: enable VFS directory
  # thor11-vfs:
